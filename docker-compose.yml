version: '3.8'

services:
  # 1. Message Broker (MQTT) - Tempat perangkat mengirimkan data
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt_broker
    ports:
      - "1883:1883" # Port MQTT standar
      - "9001:9001" # Port WebSockets (opsional)
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  # 2. Time-Series Database (InfluxDB) - Tempat menyimpan data telemetry
  influxdb:
    image: influxdb:2.7
    container_name: ts_database
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # 3. Visualization Dashboard (Grafana) - Panel monitor real-time
  grafana:
    image: grafana/grafana-oss:latest
    container_name: viz_dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  influxdb_data:
  grafana_data: